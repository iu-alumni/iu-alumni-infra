name: Bootstrap self-hosted runner tools
description: Install required packages used by deployment/setup workflows

runs:
  using: composite
  steps:
    - name: Install tools
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y python3-pip python3-venv docker.io openssh-client git

        # Remove distro ansible — too old for Ubuntu 24.04 targets (Python 3.12)
        sudo apt-get remove -y ansible ansible-core 2>/dev/null || true

        python3 -m pip install --user 'ansible-core>=2.17,<2.20'

        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

        if command -v systemctl >/dev/null 2>&1; then
          sudo systemctl start docker
        fi
        ansible-playbook --version
        python3 --version
        docker --version
