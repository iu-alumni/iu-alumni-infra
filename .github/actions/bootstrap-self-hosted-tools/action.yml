name: Bootstrap self-hosted runner tools
description: Install required packages used by deployment/setup workflows

runs:
  using: composite
  steps:
    - name: Install tools
      shell: bash
      run: |
        set -euo pipefail

        SUDO=""
        if command -v sudo >/dev/null 2>&1; then
          if sudo -n true >/dev/null 2>&1; then
            SUDO="sudo -n"
          elif [ "$(id -u)" -ne 0 ]; then
            echo "Runner user must be root or have passwordless sudo for apt installs." >&2
            exit 1
          fi
        elif [ "$(id -u)" -ne 0 ]; then
          echo "sudo is not available and runner user is not root; cannot install packages." >&2
          exit 1
        fi

        $SUDO apt-get update
        $SUDO apt-get install -y ansible docker.io docker-compose-plugin openssh-client git
        if command -v systemctl >/dev/null 2>&1; then
          $SUDO systemctl start docker || true
        fi
        ansible-playbook --version
        docker --version
