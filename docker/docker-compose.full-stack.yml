# ─────────────────────────────────────────────────────────────────────────────
# Full-stack local development — run backend, frontend, and PostgreSQL together.
#
# Usage:
#   cd iu-alumni-infra/docker
#   docker compose -f docker-compose.full-stack.yml up --build
#
# Access:
#   Backend API:     http://localhost:8080
#   Frontend app:    http://localhost:3001
#   PostgreSQL:      localhost:5432
#
# Note: Flutter mobile app remains a local run outside this compose stack.
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16
    container_name: iu_alumni_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iu_alumni_db}
      POSTGRES_USER: ${POSTGRES_USER:-alumni_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alumni_password}
    volumes:
      - iu_alumni_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-alumni_user} -d ${POSTGRES_DB:-iu_alumni_db}",
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../../iu-alumni-backend
      dockerfile: Dockerfile
    container_name: iu_alumni_backend
    environment:
      SQLALCHEMY_DATABASE_URL: postgresql://${POSTGRES_USER:-alumni_user}:${POSTGRES_PASSWORD:-alumni_password}@postgres:5432/${POSTGRES_DB:-iu_alumni_db}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ENVIRONMENT: DEV
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../iu-alumni-backend:/app
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
      "

  frontend:
    build:
      context: ../../iu-alumni-frontend
      dockerfile: Dockerfile.dev
    container_name: iu_alumni_frontend
    working_dir: /app
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://backend:8080}
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: ${FRONTEND_PORT:-3000}
      NITRO_UNIX_SOCKET: "false"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${LOCAL_FRONTEND_PORT:-3001}:3000"
    volumes:
      - ../../iu-alumni-frontend:/app
      - iu_alumni_frontend_node:/app/node_modules
    command: ["pnpm", "dev", "--hostname", "0.0.0.0", "--port", "3000"]
    depends_on:
      - backend

volumes:
  iu_alumni_postgres_data:
  iu_alumni_frontend_node:
